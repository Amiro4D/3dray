name: MHR Relay Server (6h Uptime)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'   # re-run every 5 hours to avoid gap

permissions:
  contents: write

jobs:
  relay:
    runs-on: ubuntu-latest
    timeout-minutes: 360      # 6 hours max
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Get public IP
        id: ip
        run: |
          PUBLIC_IP=$(curl -s ifconfig.me)
          echo "public_ip=$PUBLIC_IP" >> $GITHUB_OUTPUT
          # Overwrite ip.txt with just the IP
          echo "$PUBLIC_IP" > ip.txt

      - name: Commit IP to repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ip.txt
          git commit -m "Update relay IP [skip ci]" || true
          git push

      - name: Create relay server script
        run: |
          cat > relay.mjs <<'EOF'
          import http from 'node:http';

          const AUTH_KEY = process.env.AUTH_KEY || 'CHANGE_ME';
          const PORT = process.env.PORT || 443;

          const SKIP_HEADERS = new Set([
            'host','connection','content-length','transfer-encoding',
            'proxy-connection','proxy-authorization','priority','te',
          ]);

          function base64ToBytes(b64) {
            return Uint8Array.from(Buffer.from(b64, 'base64'));
          }

          async function processOne(item, selfHost) {
            if (!item || typeof item !== 'object') return { e: 'bad item' };
            if (!item.u || !/^https?:\/\//i.test(item.u)) return { e: 'bad url' };
            let url;
            try { url = new URL(item.u); } catch { return { e: 'bad url' }; }
            if (url.hostname === selfHost) return { e: 'self-fetch blocked' };

            const headers = new Headers();
            if (item.h) for (const [k,v] of Object.entries(item.h))
              if (!SKIP_HEADERS.has(k.toLowerCase())) headers.set(k,v);

            const method = (item.m || 'GET').toUpperCase();
            const opts = { method, headers, redirect: item.r === false ? 'manual' : 'follow' };

            if (item.b && method !== 'GET' && method !== 'HEAD') {
              try { opts.body = base64ToBytes(item.b); } catch { return { e: 'bad body base64' }; }
              if (item.ct && !headers.has('content-type')) headers.set('content-type', item.ct);
            }

            try {
              const resp = await fetch(item.u, opts);
              const h = {}; resp.headers.forEach((v,k) => h[k]=v);
              let bodyB64 = '';
              if (resp.body) {
                const buf = await resp.arrayBuffer();
                bodyB64 = Buffer.from(buf).toString('base64');
              }
              return { s: resp.status, h, b: bodyB64 };
            } catch (err) {
              return { e: 'fetch failed: ' + String(err) };
            }
          }

          const server = http.createServer(async (req, res) => {
            if (req.method !== 'POST') {
              res.writeHead(405).end(JSON.stringify({ e: 'method not allowed' }));
              return;
            }
            const chunks = [];
            req.on('data', c => chunks.push(c));
            req.on('end', async () => {
              let body;
              try { body = JSON.parse(Buffer.concat(chunks).toString()); } catch {
                res.writeHead(400).end(JSON.stringify({ e: 'bad json' }));
                return;
              }
              if (body.k !== AUTH_KEY) {
                res.writeHead(401).end(JSON.stringify({ e: 'unauthorized' }));
                return;
              }
              const selfHost = req.headers.host?.split(':')[0] || 'localhost';
              let result;
              if (Array.isArray(body.q)) {
                if (body.q.length === 0) {
                  res.writeHead(200, {'Content-Type':'application/json'}).end(JSON.stringify({q:[]}));
                  return;
                }
                const results = await Promise.all(body.q.map(item => processOne(item, selfHost).catch(e => ({e:String(e)}))));
                result = { q: results };
              } else {
                result = await processOne(body, selfHost).catch(e => ({e:String(e)}));
              }
              res.writeHead(result.e ? 502 : 200, {'Content-Type':'application/json'});
              res.end(JSON.stringify(result));
            });
          });

          server.listen(PORT, '0.0.0.0', () => console.log(`Relay on port ${PORT}`));
          EOF

      - name: Start relay server on port 443
        env:
          AUTH_KEY: ${{ secrets.RELAY_AUTH_KEY }}
        run: |
          sudo node relay.mjs &
          sleep 3   # wait for server to bind

      - name: Keep alive for 350 minutes
        run: |
          echo "Relay running. IP: $(cat ip.txt)"
          sleep 350m
